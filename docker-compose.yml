version: '3.9'

services:

api:
build:
context: .
target: builder
command: sh -c "npm run build && node dist/main.js"
ports:
- '3000:3000'
environment:
NODE_ENV: production
PORT: 3000
API_PREFIX: api/v1
FRONTEND_URL: 'http://3.133.149.115:3000'

```
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: monivo
  DB_USER: monivo
  DB_PASSWORD: monivo_dev
  DB_SSL: 'false'
  DB_SYNC: 'true'

  REDIS_HOST: redis
  REDIS_PORT: 6379

  JWT_SECRET: dev-jwt-secret-at-least-32-chars-long
  JWT_REFRESH_SECRET: dev-refresh-secret-at-least-32-chars!!
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 30d
  BCRYPT_ROUNDS: 10

  PLAID_ENV: sandbox
  PLAID_CLIENT_ID: ''
  PLAID_SECRET: ''
  PLAID_WEBHOOK_URL: ''

  AWS_REGION: us-east-1
  AWS_KMS_KEY_ID: ''

  OTEL_ENABLED: 'false'

  SES_FROM_EMAIL: noreply@monivo.ai

  THROTTLE_TTL: 60
  THROTTLE_LIMIT: 500

depends_on:
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

restart: unless-stopped

healthcheck:
  test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health/live || exit 1']
  interval: 10s
  timeout: 5s
  retries: 6
  start_period: 40s
```

postgres:
image: postgres:16-alpine
environment:
POSTGRES_DB: monivo
POSTGRES_USER: monivo
POSTGRES_PASSWORD: monivo_dev
ports:
- '5432:5432'
volumes:
- pg_data:/var/lib/postgresql/data
healthcheck:
test: ['CMD-SHELL', 'pg_isready -U monivo -d monivo']
interval: 5s
timeout: 5s
retries: 10
restart: unless-stopped

redis:
image: redis:7-alpine
command: redis-server --save 60 1 --loglevel warning
ports:
- '6379:6379'
volumes:
- redis_data:/data
healthcheck:
test: ['CMD', 'redis-cli', 'ping']
interval: 5s
timeout: 3s
retries: 10
restart: unless-stopped

volumes:
pg_data:
redis_data:
